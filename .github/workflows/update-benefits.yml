name: Update Student Benefits

on:
  schedule:
    # 每天早上 8 點 (台北時間 = UTC 0:00) 自動跑
    - cron: '0 0 * * *'
  workflow_dispatch: # 也可以手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline and output JSON
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python main.py --output-json docs/data.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: auto-update benefits data $(date -u +%Y-%m-%d)"
          git push
